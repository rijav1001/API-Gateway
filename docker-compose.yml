version: '3.8'

services:
  user-service:
    build:
      context: ./services/user-service
    ports:
      - "8081:8081"
    networks:
      - gateway-network

  order-service:
    build:
      context: ./services/order-service
    ports:
      - "8082:8082"
    networks:
      - gateway-network

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      - USER_SERVICE_URL=http://user-service:8081
      - ORDER_SERVICE_URL=http://order-service:8082
    depends_on:
      - user-service
      - order-service
    networks:
      - gateway-network

networks:
  gateway-network:
    driver: bridge